name: MacMTP support request
description: Report a MacMTP problem or ask for help
title: "[MacMTP] "
body:
  - type: markdown
    attributes:
      value: |
        GitHub issues are public. Do not include file contents, credentials, device serial numbers, private local paths, or other sensitive information.
  - type: input
    id: macmtp-version
    attributes:
      label: MacMTP version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Android device and version
      description: Do not include the device serial number.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what you expected and what happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic details
      description: Paste only details you are comfortable making public. Remove sensitive information first.
